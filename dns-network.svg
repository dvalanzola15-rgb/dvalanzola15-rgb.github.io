<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
<title id="title">DNS network diagram</title><desc id="desc">A browser connects through a resolver to DNS servers and a website.</desc>
<rect width="800" height="500" fill="#eef6fd"/>
<g font-family="Arial" text-anchor="middle">
<rect x="40" y="190" width="140" height="90" rx="12" fill="#ffffff" stroke="#00509e" stroke-width="4"/><text x="110" y="230" font-size="24" fill="#003366">Browser</text><text x="110" y="258" font-size="17">example.com</text>
<rect x="245" y="190" width="145" height="90" rx="12" fill="#ffffff" stroke="#00509e" stroke-width="4"/><text x="317" y="230" font-size="22" fill="#003366">Resolver</text><text x="317" y="258" font-size="16">DNS lookup</text>
<rect x="455" y="55" width="145" height="80" rx="12" fill="#ffffff" stroke="#00509e" stroke-width="4"/><text x="527" y="103" font-size="22" fill="#003366">Root</text>
<rect x="455" y="210" width="145" height="80" rx="12" fill="#ffffff" stroke="#00509e" stroke-width="4"/><text x="527" y="258" font-size="22" fill="#003366">TLD</text>
<rect x="455" y="365" width="145" height="80" rx="12" fill="#ffffff" stroke="#00509e" stroke-width="4"/><text x="527" y="401" font-size="18" fill="#003366">Authoritative</text><text x="527" y="425" font-size="18">Server</text>
<rect x="650" y="190" width="115" height="90" rx="12" fill="#ffffff" stroke="#00509e" stroke-width="4"/><text x="707" y="230" font-size="22" fill="#003366">Website</text><text x="707" y="258" font-size="15">IP address</text>
</g>
<g stroke="#0077cc" stroke-width="5" fill="none" marker-end="url(#arrow)"><path d="M180 235H245"/><path d="M390 220C430 190 430 105 455 95"/><path d="M390 235H455"/><path d="M390 250C430 280 430 395 455 405"/><path d="M600 250H650"/></g>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0077cc"/></marker></defs>
</svg>
